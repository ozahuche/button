<style>
 .Subscribe-button{
  background-color: rgb(204, 0, 0); 
  color: white;
  border: none; 
  padding-top:10px; 
  padding-bottom:10px;
  padding-left: 16px;
  padding-right: 16px;
  border-radius: 2px;
  cursor: pointer; 
  margin-right: 8px;
  transition: opacity 0.15s;
  vertical-align: top;

}
 
 .Subscribe-button:hover{
opacity: 0.8;
 }

.Subscribe-button:active{
  opacity: 0.5;
}


 

.Join-button{
  color: rgb(6, 95, 212);
  background-color: white;
  border-radius: 2px;
  border-color: rgb(6, 95, 212);
  border-style: solid;
  padding-top:8px; 
  padding-bottom:8px;
  padding-left: 16px;
  padding-right: 16px; 
  cursor: pointer;
  transition: background-color 0.15s, color 0.15s
}

.Join-button:hover{
  background-color: rgb(6, 95, 212);
  color: white;
}

.Tweet-button{ 
  color: rgb(255, 255, 255); 
  background-color: rgb(29, 155, 240);
   padding-top:9px; 
  padding-bottom:9px;
  padding-left: 16px;
  padding-right: 16px;
  border:none; 
  border-radius: 18px;
  font-weight: bold;
  font-size: 15px;
  cursor: pointer;
  margin-left: 8px;
  transition: box-shadow 0.15s;
  vertical-align: top;

}

.Tweet-button:hover{
  box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.15);
}

</style>



<button class="Subscribe-button">SUBSCRIBE</button>
<button class="Join-button">JOIN</button> 
<button class="Tweet-button">Tweet</button>
